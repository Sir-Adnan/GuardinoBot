name: guardinobot

services:
  bot:
    image: ghcr.io/sir-adnan/guardinobot:latest
    build: .
    restart: on-failure
    ports:
      - "127.0.0.1:3333:3333"
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  api:
    # Web-panel API (§9). Same image as the bot, different command. Migrations
    # stay owned by the bot service, so this only runs uvicorn (no prestart).
    image: ghcr.io/sir-adnan/guardinobot:latest
    build: .
    restart: on-failure
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes --replica-read-only no
    volumes:
      - "/var/lib/guardinobot/docker-volumes/redis:/data"

  mariadb:
    image: mariadb:11
    restart: always
    volumes:
      - /var/lib/guardinobot/docker-volumes/mariadb:/var/lib/mysql
    environment:
      # change these and keep them in sync with DATABASE_URL in .env
      MYSQL_ROOT_PASSWORD: change_me_root
      MYSQL_DATABASE: guardino
      MYSQL_USER: guardino
      MYSQL_PASSWORD: change_me
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
