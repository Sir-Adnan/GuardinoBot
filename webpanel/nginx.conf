server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for any unknown path (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI service (same-origin → no CORS).
    # ${API_UPSTREAM} is envsubst'ed at container start (nginx templates dir);
    # default "api:8000". Multi-bot installs MUST override it with the
    # instance's unique api container name: on the shared docker network every
    # instance's service is aliased "api", so the bare name round-robins across
    # ALL bots' APIs (login codes from the wrong bot + random 401 logouts).
    location /api/ {
        # Docker's embedded DNS + a variable upstream: nginx resolves per
        # request (valid=10s), so it starts fine even if the api container is
        # down and follows the api's new IP after a restart — a literal
        # proxy_pass host is resolved once at startup and goes stale.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $gb_api http://${API_UPSTREAM};
        proxy_pass $gb_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
