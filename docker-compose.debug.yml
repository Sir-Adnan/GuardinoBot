services:
  bot:
    # image: ghcr.io/sir-adnan/guardinobot:latest
    build: .
    restart: on-failure
    ports:
      - "3333:3333"
    env_file:
      - .env

    depends_on:
      - mariadb
      - redis
  marzban:
    image: gozargah/marzban:dev
    restart: always
    env_file: .env.marzban
    ports:
      - 8888:8000
    volumes:
      - /var/lib/marzban:/var/lib/marzban
  redis:
    image: redis:alpine
    restart: always
    ports:
      - 127.0.0.1:63791:6379
    volumes:
      - "/var/lib/guardinobot/docker-volumes/redis:/data"
    command: redis-server --appendonly yes --replica-read-only no

  mariadb:
    image: "mariadb:latest"
    restart: always
    ports:
      - 127.0.0.1:33061:3306
    volumes:
      - /var/lib/guardinobot/docker-volumes/mariadb:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234sss
      MYSQL_DATABASE: guardino
      MYSQL_USER: guardino
      MYSQL_PASSWORD: 1234sss

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "127.0.0.1:8010:80"
    environment:
      PMA_HOST: mariadb
      UPLOAD_LIMIT: 300M
